<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ترانا بنظهر أقوى</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&family=Changa:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <header class="hero">
      <div class="hero-band">
        <img class="logo" src="assets/logo-right.png" alt="شعار المبادرة" />
        <div class="hero-text">
          <h1>ترانا بنظهر أقوى</h1>
          <p>الشيخ محمد بن زايد - رئيس الدولة</p>
          <p>مدرسة مدينة زايد - ذكور</p>
        </div>
        <img class="logo" src="assets/logo-left.png" alt="شعار مدارس مدينة زايد" />
      </div>
      <div class="hero-sub">
        <h2>مبادرة أقوى بالعطاء</h2>
      </div>
    </header>

    <main class="content">
      <section class="panel">
        <form class="form single" id="submission-form">
          <div class="field-grid">
            <label class="field">
              <span>عنوان المشاركة</span>
              <input type="text" id="story-title" placeholder="اكتب عنواناً مميزاً..." required />
            </label>
            <label class="field">
              <span>اسمك</span>
              <input type="text" id="story-name" placeholder="اسمك أو اسم فريقك..." required />
            </label>
          </div>
          <label class="field">
            <span>وصف التجربة</span>
            <textarea id="story-desc" rows="5" placeholder="اكتب وصفاً مختصراً عن تجربتك أو عطائك..." required></textarea>
          </label>
          <label class="field">
            <span>ارفع صورة المشاركة</span>
            <input type="file" id="story-image" accept="image/*" required />
          </label>
          <button class="submit" type="submit">إرسال المشاركة</button>
        </form>
      </section>

      <section class="submissions">
        <div class="list active">
          <h3>كل المشاركات</h3>
          <ul id="story-list"></ul>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
